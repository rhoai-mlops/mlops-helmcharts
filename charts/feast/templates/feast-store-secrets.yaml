---
apiVersion: v1
kind: Secret
metadata:
  name: feast-registry-secret
  labels:
    app: feast-database
type: Opaque
stringData:
  sql: |
    path: postgresql+psycopg://feast:feast@feast:5432/feast
    cache_ttl_seconds: 60
    sqlalchemy_config_kwargs:
      echo: false
      pool_pre_ping: true
---
apiVersion: v1
kind: Secret
metadata:
  name: feast-online-store-secret
  labels:
    app: feast-database
type: Opaque
stringData:
  postgres: |
    host: feast
    port: 5432
    database: feast
    db_schema: feast
    user: feast
    password: feast
---
apiVersion: v1
kind: Secret
metadata:
  name: feast-s3-secret
  labels:
    app: feast-database
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "{{ .Values.USER_NAME }}"
  AWS_SECRET_ACCESS_KEY: thisisthepassword
  AWS_DEFAULT_REGION: wonderland
  AWS_S3_BUCKET: data
  AWS_S3_ENDPOINT: "http://minio-service.{{ .Release.Namespace }}.svc.cluster.local:9000"

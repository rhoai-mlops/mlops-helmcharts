---
apiVersion: v1
kind: ConfigMap
metadata:
  name: feast-registry
data:
  feature_store.yaml: |  
    project: feast_from_file
    provider: local
    registry:
        registry_store_type: PostgreSQLRegistryStore
        path: feast_registry
        host: feast.{{ .Release.Namespace }}.svc.cluster.local
        port: 5432
        database: feast
        db_schema: feast
        user: feast
        password: feast
    online_store:
        type: postgres
        host: feast.{{ .Release.Namespace }}.svc.cluster.local
        port: 5432
        database: feast
        db_schema: feast
        user: feast
        password: feast
    offline_store:
        type: file
    entity_key_serialization_version: 2
